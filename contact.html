<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact Page</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="tasks.html">Tasks</a>
        <a href="timer.html">Study Timer</a>
        <a href="resources.html">Resources</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section>
    <h2>Contact Form</h2>

    <form>
        <label>Name:</label>
        <input type="text" name="name">

        <br><br>

        <label>Student Type:</label><br>

        <input type="radio" name="student" value="highschool"> High School
        <input type="radio" name="student" value="college"> College

        <br><br>

        <label>What tools do you use?</label><br>

        <input type="checkbox" name="tools" value="calendar"> Calendar
        <input type="checkbox" name="tools" value="timer"> Study Timer

        <br><br>

        <label>Favorite Subject:</label>

        <select>
            <option>Math</option>
            <option>Science</option>
            <option>History</option>
            <option>English</option>
        </select>

        <br><br>

        <input type="submit" value="Submit">
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
